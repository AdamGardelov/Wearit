name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  VITE_SUPABASE_URL: https://wearit-ci.supabase.co
  VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_test

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
